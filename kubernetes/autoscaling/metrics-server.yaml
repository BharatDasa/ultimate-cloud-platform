apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-server
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:metrics-server

rules:
  - apiGroups: [""]
    resources:
      - nodes/metrics
    verbs:
      - get

  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
      - configmaps
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-server-auth-reader

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:metrics-server

subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metrics-server-auth-reader
  namespace: kube-system

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader

subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: kube-system

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-server
  namespace: kube-system

spec:
  selector:
    app: metrics-server

  ports:
    - name: https
      port: 443
      targetPort: 10250

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: metrics-server

  template:
    metadata:
      labels:
        app: metrics-server

    spec:
      serviceAccountName: metrics-server

      containers:
        - name: metrics-server

          image: registry.k8s.io/metrics-server/metrics-server:v0.7.1

          imagePullPolicy: Always

          args:
            - --kubelet-insecure-tls
            - --kubelet-preferred-address-types=InternalIP
            - --metric-resolution=15s
            - --secure-port=10250
            - --cert-dir=/tmp

          ports:
            - containerPort: 10250

          securityContext:
            readOnlyRootFilesystem: false

          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

          resources:
            requests:
              cpu: 100m
              memory: 200Mi

            limits:
              cpu: 200m
              memory: 300Mi

      volumes:
        - name: tmp-dir
          emptyDir: {}

---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.metrics.k8s.io

spec:
  service:
    name: metrics-server
    namespace: kube-system

  group: metrics.k8s.io
  version: v1beta1

  insecureSkipTLSVerify: true

  groupPriorityMinimum: 100
  versionPriority: 100

