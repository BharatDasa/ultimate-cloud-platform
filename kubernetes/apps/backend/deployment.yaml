apiVersion: apps/v1

kind: Deployment

metadata:

  name: backend

  namespace: apps

spec:

  replicas: 2

  selector:

    matchLabels:

      app: backend

  template:

    metadata:

      labels:

        app: backend

    spec:

      containers:

        - name: backend

          image: 913524913728.dkr.ecr.ap-south-1.amazonaws.com/ultimate-platform-backend:latest

          imagePullPolicy: Always

          ports:

            - containerPort: 3000

          resources:

            requests:

              cpu: "250m"

              memory: "250Mi"

            limits:

              cpu: "500m"

              memory: "512Mi"

          livenessProbe:

            httpGet:

              path: /health

              port: 3000

            initialDelaySeconds: 15

            periodSeconds: 10

          readinessProbe:

            httpGet:

              path: /health

              port: 3000

            initialDelaySeconds: 5

            periodSeconds: 5
